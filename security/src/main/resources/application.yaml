spring:
  application:
    name: security-service

  datasource:
    url: jdbc:mysql://localhost:3306/esell_user?createDatabaseIfNotExist=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true

server:
  port: 9898

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
